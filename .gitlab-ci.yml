stages:
  - lint
  - build

lint:
  stage: lint
  image: node:18
  script:
    - npm ci
    - npm run lint
  tags:
    - docker
  only:
    - merge_requests
    - main

typescript:
  stage: lint
  image: node:18
  script:
    - npm ci
    - npm run check
  tags:
    - docker
  only:
    - merge_requests
    - main

build:
  stage: build
  image: node:18
  script:
    - npm ci
    - npm run build
  tags:
    - docker
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh
  script:
    - echo "Deploying build to 'build-only' branch..."

    # clone the repo and switch to the build-only branch
    - git config --global user.name "$GITLAB_USER_NAME"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git clone --depth=1 --branch=build-only "$CI_REPOSITORY_URL" temp || git clone --depth=1 "$CI_REPOSITORY_URL" temp
    - cd temp
    - git checkout -B build-only

    # remove all old files, copy new build, and clean .gitignore
    - rm -rf *
    - cp -r ../build/* .
    - find . -name ".gitignore" -delete

    # commit and push
    - git add .
    - git commit -m "Deploy from $CI_COMMIT_REF_NAME ($CI_COMMIT_SHORT_SHA)" || echo "Nothing to commit"
    - git push origin build-only
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
